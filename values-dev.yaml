# Development Environment Configuration for Universal Messaging
# 3-node cluster for high availability

global:
  namespace: webmethods

# Number of UM server nodes
replicaCount: 3

# UM image configuration - Using IBM WebMethods ACR
image:
  registry: abiwebmethods.azurecr.io
  repository: webmethods/universalmessaging-server
  tag: "11.1.2"
  pullPolicy: IfNotPresent

# Service configuration
service:
  type: ClusterIP
  ports:
    nsp: 9000        # NSP protocol port for client connections
    jmx: 9200        # JMX Prometheus monitoring port

# Resource allocation per UM pod
resources:
  requests:
    memory: "1Gi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "1000m"

# Persistent storage configuration
persistence:
  enabled: true
  storageClass: "default"
  accessMode: ReadWriteOnce
  size: 10Gi

# Universal Messaging configuration
um:
  realmName: "umCluster"

# High availability with pod anti-affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app: wm-um

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Health Probes - using /health/ endpoint
healthProbes:
  startup:
    enabled: true
    initialDelaySeconds: 120
    periodSeconds: 15
    timeoutSeconds: 30
    failureThreshold: 20
  liveness:
    enabled: true
    initialDelaySeconds: 180
    periodSeconds: 30
    timeoutSeconds: 30
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 120
    periodSeconds: 15
    timeoutSeconds: 30
    failureThreshold: 3

# Pod annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9200"

# Pod labels
podLabels:
  app: wm-um
  component: messaging
  tier: middleware

# Environment variables for UM configuration
env:
  - name: REALM_NAME
    value: "umCluster"
  - name: INIT_JAVA_MEM_SIZE
    value: "512"
  - name: MAX_JAVA_MEM_SIZE
    value: "1536"
  - name: MAX_DIRECT_MEM_SIZE
    value: "1G"
  - name: BASIC_AUTH_ENABLE
    value: "Y"
  - name: LOG_FRAMEWORK
    value: "log4j2"
