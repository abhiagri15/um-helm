apiVersion: v1
kind: Service
metadata:
  name: {{ include "um.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "um.fullname" . }}
    component: messaging
spec:
  type: {{ .Values.service.type }}
  ports:
  - name: nsp
    port: {{ .Values.service.ports.nsp }}
    targetPort: nsp
    protocol: TCP
  - name: jmx
    port: {{ .Values.service.ports.jmx }}
    targetPort: jmx
    protocol: TCP
  selector:
    app: {{ include "um.fullname" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "um.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "um.fullname" . }}
    component: messaging
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - name: nsp
    port: {{ .Values.service.ports.nsp }}
    targetPort: nsp
    protocol: TCP
  - name: jmx
    port: {{ .Values.service.ports.jmx }}
    targetPort: jmx
    protocol: TCP
  selector:
    app: {{ include "um.fullname" . }}
